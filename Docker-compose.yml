version: "3.9"

services:
  api:
    build: .
    container_name: vibesense-api
    ports:
      - "10000:10000"
    environment:
      - PORT=10000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ./store.mp4:/app/store.mp4
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s