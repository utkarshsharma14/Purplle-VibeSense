<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeSense AI - Live Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
    <nav class="border-b border-slate-800 bg-slate-950/50 backdrop-blur px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-white">VibeSense <span class="text-purple-400">AI</span></h1>
            <div class="text-xs bg-slate-800 px-3 py-1 rounded-full text-slate-300">Live Stream</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-slate-950 border border-slate-800 p-6 rounded-2xl">
                <p class="text-slate-400 text-xs uppercase">Occupancy</p>
                <h3 id="occupancy-val" class="text-5xl font-bold mt-4">0</h3>
            </div>
            <div class="bg-slate-950 border border-slate-800 p-6 rounded-2xl">
                <p class="text-slate-400 text-xs uppercase">Store Mood</p>
                <h3 id="vibe-val" class="text-3xl font-bold mt-5 text-purple-400">Loading...</h3>
            </div>
            <div class="bg-slate-950 border border-slate-800 p-6 rounded-2xl">
                <p class="text-slate-400 text-xs uppercase">Audio</p>
                <h3 id="music-val" class="text-lg font-medium mt-6 text-emerald-400">Syncing...</h3>
            </div>
        </div>
        <div id="alerts-wrapper" class="bg-slate-950 border border-slate-800 rounded-2xl p-6">
            <h2 class="text-lg font-bold mb-4">Live Alerts</h2>
            <div id="alerts-container"></div>
        </div>
    </main>

    <script>
        // Endpoint change kar diya hai taaki live server pe chale
        async function updateDashboard() {
            try {
                const res = await fetch("/api/v1/store/vibe");
                const data = await res.json();
                document.getElementById("occupancy-val").innerText = data.current_occupancy;
                document.getElementById("vibe-val").innerText = data.store_vibe;
                document.getElementById("music-val").innerText = data.ambient_music;
            } catch (e) { console.log("Update error"); }
        }
        setInterval(updateDashboard, 2000);
        updateDashboard();
    </script>
</body>
</html>
